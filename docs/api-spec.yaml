openapi: 3.0.3
info:
  title: CLIR API
  description: |
    식품 바코드/OCR 스캔 → 성분 분석 → 알러지·식이 프로필 대조 → 개인화 위협 판정.

    **MVP 종료. 이 명세는 Full Product 기준이다.**
    상세 구현 맥락은 `docs/architecture.md`, OCR 파이프라인은 `docs/ocr-pipeline-rebuild-guide.md`.

    ## 인증
    소셜 로그인(Google / Apple) 후 Supabase에서 발급받은 access token을
    모든 보호된 엔드포인트의 Authorization 헤더에 포함해야 합니다.
    Authorization: Bearer {token}

    토큰 발급·갱신은 클라이언트가 Supabase Auth와 직접 통신하며,
    백엔드는 verifyToken 미들웨어로 토큰을 검증만 합니다.

    ## OCR
    1차 추출은 OpenAI Vision(gpt-4o-mini / gpt-4o). 저신뢰·CJK/아랍어에서는
    Google Vision DOCUMENT_TEXT_DETECTION + gpt-4.1-mini 2단계 폴백으로 에스컬레이션됩니다.

    `POST /ocr`은 기본 SSE 스트리밍입니다.
      - Accept: text/event-stream  (기본) — ingredient 증분 이벤트 + done 메타
      - Accept: application/json                — 동기 JSON 응답 (관리/자동화용)

    요청 본문의 phash 필드가 L3(Redis) 캐시 조회에 사용됩니다. 히트 시 `cached` 이벤트로 즉시 응답.
    pipeline 상세: `docs/ocr-pipeline-rebuild-guide.md §4`.

    ## 캐싱 3계층
    - L1 FE MMKV pHash          (클라 로컬)
    - L2 바코드 → Supabase/OFF  (GET /products/:barcode)
    - L3 BE Redis pHash          (POST /ocr 내부)

    모든 캐시 키에 schemaVersion 포함 — 프롬프트/모델 변경 시 일괄 무효화.

    ## 개인정보
    - 스캔 이미지는 동의(`consentImageRetention=true`) 시에만 90일간 보존.
    - POST /corrections는 `consentCorrections=true`일 때만 저장.
    - GDPR: GET /users/me/export · DELETE /users/me 지원.

    ## 제품 업서트
    OCR 결과는 `product-upsert.service`가 pHash + 성분셋 Jaccard로 유사 레코드를 찾아
    `products` 테이블에 병합·신규 insert 합니다. OCR 경로에서도 `productId`가 반환되므로
    즐겨찾기·이력 저장 시 FK violation이 발생하지 않습니다.

    ## Full Product 범위
    - 소셜 로그인 (Google / Apple) / 설문조사 / 멀티 프로필
    - 네이티브 문서 스캐너 + 실시간 블러 프리뷰 기반 캡처
    - 폴백 사다리 5단계 + 3계층 캐시
    - 유저 교정 수집 (데이터 플라이휠)
    - 제품 검색 / 자동완성 (pg_trgm 기반)
    - 관측성 · 비용 SLO · GDPR
    - EAS Build 기반 앱스토어 배포
  version: 2.1.0

servers:
  - url: http://localhost:3000
    description: 로컬 개발 서버
  - url: https://api.clir.app
    description: 프로덕션 서버

security:
  - BearerAuth: []

paths:

  # ─────────────────────────────────────
  # 인증 (Auth)
  # ─────────────────────────────────────

  /auth/survey:
    post:
      tags: [Auth]
      summary: 설문조사 제출 / 프로필 편집
      description: |
        두 가지 맥락에서 호출되는 단일 엔드포인트입니다.
        1) 최초 소셜 로그인 직후 — `GET /auth/me`의 `hasCompletedSurvey`가 false일 때
           알러지 프로필·식이 제한·민감도를 최초 저장합니다.
        2) 프로필 편집 시 — 프로필 탭의 "내 프로필" 편집 화면에서
           알러지 프로필·민감도를 갱신할 때도 같은 엔드포인트를 재사용합니다.

        전체-치환 시맨틱: 클라이언트는 3필드를 항상 현재 값 기준으로 모두 보내야 합니다.
        부분 업데이트가 필요한 화면도 나머지 필드는 로컬 상태의 현재 값을 그대로 포함합니다.

        profiles row는 Supabase의 handle_new_user 트리거가
        auth.users 생성 시점에 자동으로 만들어 두므로
        이 엔드포인트는 update만 수행합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [allergyProfile, dietaryRestrictions, sensitivityLevel]
              properties:
                allergyProfile:
                  type: array
                  items:
                    type: string
                  example: [ing-peanut, ing-gluten]
                  description: |
                    알러지 성분 ID 목록.
                    가능한 값: ing-peanut, ing-gluten, ing-dairy,
                               ing-egg, ing-shellfish, ing-treenut
                dietaryRestrictions:
                  type: array
                  items:
                    type: string
                  example: [vegan]
                  description: |
                    식이 제한 목록.
                    가능한 값: vegan, vegetarian, halal, kosher
                sensitivityLevel:
                  type: string
                  enum: [strict, normal]
                  example: strict
                  description: |
                    strict: 엄격 모드 — may contain 포함 경고
                    normal: 일반 모드 — 직접 함유만 경고
      responses:
        '200':
          description: 설문 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 설문이 저장되었습니다.
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: 현재 사용자 프로필 조회
      description: |
        Authorization 헤더의 토큰으로 현재 로그인된 사용자의 프로필을 반환합니다.
        프런트는 두 시점에 호출합니다:
          1) 소셜 로그인 직후 — hasCompletedSurvey로 Survey 진입 여부 판단
          2) 세션 복원 시 — 앱 재시작 후 저장된 토큰 유효성 확인 + 최신 프로필 로드
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 사용자 또는 프로필을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PROFILE_NOT_FOUND
                message: 프로필을 찾을 수 없습니다.

  # ─────────────────────────────────────
  # 사용자 (GDPR)
  # ─────────────────────────────────────

  /users/me/export:
    get:
      tags: [Users]
      summary: 내 데이터 내보내기 (GDPR Art. 20)
      description: |
        현재 사용자의 계정·이력·즐겨찾기·교정 데이터를 JSON으로 반환합니다.
        개인정보 처리방침에 따른 데이터 이동권 보장.
      responses:
        '200':
          description: 데이터 JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/UserProfile'
                  scanHistory:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScanHistoryItem'
                  favorites:
                    type: array
                    items:
                      $ref: '#/components/schemas/FavoriteItem'
                  corrections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Correction'
                  exportedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Users]
      summary: 계정 및 전체 데이터 삭제 (GDPR Art. 17)
      description: |
        계정 + 이력 + 즐겨찾기 + 교정 + 저장된 이미지를 30일 내 영구 삭제합니다.
        호출 직후 세션은 무효화되며, 이후 모든 보호된 엔드포인트가 UNAUTHORIZED를 반환합니다.
      responses:
        '202':
          description: 삭제 요청 접수 (30일 내 완료)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 삭제 요청이 접수되었습니다. 30일 내 완료됩니다.
                  deletionScheduledAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────
  # 제품 / 스캔
  # ─────────────────────────────────────

  /products/{barcode}:
    get:
      tags: [Products]
      summary: 바코드로 제품 조회
      description: |
        바코드 번호로 제품 정보를 조회합니다.
        자체 DB를 먼저 조회하고, 없으면 Open Food Facts API에서 가져옵니다.
        반환된 ingredients 목록을 POST /analysis에 전달해 위험도를 판정합니다.
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
          example: '0034000020430'
      responses:
        '200':
          description: 제품 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 등록되지 않은 바코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PRODUCT_NOT_FOUND
                message: 등록되지 않은 제품입니다.

  /products/by-id/{id}:
    get:
      tags: [Products]
      summary: 제품 ID로 상세 조회 (비-바코드)
      description: |
        UUID / seed-* / off-* / ocr-* 등 비-바코드 식별자로 제품 상세 조회.
        HistoryProductDetail 화면이 scan-history 요약 → 전체 성분 보강 시 사용.
        응답의 riskLevel, isSafe, riskIngredients, mayContainIngredients 는 현재 프로필 기준으로 주입된 상태.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          example: 'off-0034000020430'
      responses:
        '200':
          description: 제품 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 등록되지 않은 제품
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PRODUCT_NOT_FOUND
                message: 해당 제품을 찾을 수 없습니다.

  /allergens/catalog:
    get:
      tags: [Allergens]
      summary: 알러지 카탈로그 (카테고리 + 항목 + ing-* 매핑)
      description: |
        FE Survey/Personalization 화면이 렌더할 알러지 카테고리 트리를 반환한다.
        기존에 FE 가 하드코딩하던 ALLERGY_CATEGORIES / ALLERGY_CANDIDATES 를 대체한다.
        응답 items[].allergenId (ing-*) 가 있는 항목만 BE 판정 대상이며,
        매핑 없는 항목은 UI 표시 가능하지만 판정 범위 밖.
        인증 불필요.
      parameters:
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum: [en, ko]
          description: 표시명 언어 (기본 en)
      responses:
        '200':
          description: 카탈로그
          content:
            application/json:
              schema:
                type: object
                required: [version, categories, allergens]
                properties:
                  version: { type: integer, example: 1 }
                  categories:
                    type: array
                    items:
                      type: object
                      required: [code, name, items]
                      properties:
                        code:  { type: string, example: Dairy }
                        name:  { type: string, example: Dairy }
                        items:
                          type: array
                          items:
                            type: object
                            required: [name]
                            properties:
                              name:        { type: string, example: Milk }
                              allergenId:  { type: string, example: ing-milk, nullable: true }
                  allergens:
                    type: array
                    items:
                      type: object
                      required: [id, name, category, riskDefault]
                      properties:
                        id:          { type: string, example: ing-milk }
                        name:        { type: string, example: Milk }
                        category:    { type: string, example: Dairy }
                        riskDefault: { type: string, enum: [danger, caution] }

  /products/{id}/alternatives:
    get:
      tags: [Products]
      summary: 대체 제품 추천
      description: |
        분석 결과 danger 또는 caution 판정이 났을 때 호출합니다.
        같은 카테고리 내에서 현재 사용자 프로필 기준으로 안전한 제품 목록을 반환합니다.
        대체 제품이 없을 경우 빈 배열을 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: prod-001
      responses:
        '200':
          description: 대체 제품 목록 반환 (없으면 빈 배열)
          content:
            application/json:
              schema:
                type: object
                properties:
                  alternatives:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 제품을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PRODUCT_NOT_FOUND
                message: 해당 제품을 찾을 수 없습니다.

  /ocr:
    post:
      tags: [Scan]
      summary: OCR 성분 추출 (SSE 기본)
      description: |
        식품 성분표 이미지를 업로드하면 폴백 사다리(`docs/ocr-pipeline-rebuild-guide.md §4.2`)로
        성분을 추출해 반환합니다.

        ## 응답 형식 선택
        - Accept: text/event-stream  (기본) — SSE 증분 스트리밍
        - Accept: application/json                — 동기 JSON 응답

        ## SSE 이벤트
        - event: cached     — L3 pHash 캐시 히트. data는 OCRResult 전체
        - event: ingredient — 성분 1개 증분. data는 IngredientSummary
        - event: done       — 최종 메타. data는 OCRDoneMeta
        - event: error      — 에러. data는 ErrorEvent (retryable 포함)

        ## 요청 필드
        - image       (필수)  — 성분표 이미지 (jpg/png/webp)
        - phash       (권장)  — FE에서 계산한 64-bit pHash (hex). L3 캐시 조회에 사용
        - mlkitText   (선택)  — 온디바이스 OCR 프리패스 결과. 저품질이어도 전달 권장 (힌트로만 사용)
        - languageHint (선택) — 사용자 언어 (BCP-47). 폴백 사다리 라우팅에 사용

        ## 제품 업서트
        성공 응답에는 `productId`가 포함됩니다. OCR 결과가 pHash + 성분셋 Jaccard ≥ 0.8로 기존
        레코드와 유사하면 병합, 아니면 신규 insert. 즐겨찾기·이력 저장 시 이 ID 사용.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: 성분표가 포함된 식품 이미지 파일 (jpg, png, webp)
                phash:
                  type: string
                  pattern: '^[0-9a-f]{16}$'
                  description: 64-bit perceptual hash (FE 계산)
                  example: 'c3f1a0b8d4e60927'
                mlkitText:
                  type: string
                  description: 온디바이스 OCR 프리패스 결과 (선택)
                languageHint:
                  type: string
                  description: BCP-47 언어 코드 (선택)
                  example: ko
      responses:
        '200':
          description: |
            OCR 성공.
            Accept 헤더에 따라 SSE 또는 JSON으로 응답.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE 이벤트 스트림. 예:

                    event: cached
                    data: {"extractedText":"Ingredients: Peanuts...","ingredients":[...],"overallConfidence":0.98,...}

                    event: ingredient
                    data: {"id":"ing-peanut","name":"Peanuts","nameKo":"땅콩","confidence":0.95}

                    event: ingredient
                    data: {"id":"ocr-2","name":"Sugar","nameKo":"설탕","confidence":0.98}

                    event: done
                    data: {"overallConfidence":0.92,"illegibleRegions":0,"detectedLanguages":["en"],"productId":"prod-abc","ladderStage":1}
            application/json:
              schema:
                $ref: '#/components/schemas/OCRResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: 이미지 파일 용량 초과 (10MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: IMAGE_TOO_LARGE
                message: 이미지 파일이 너무 큽니다. 10MB 이하로 업로드해 주세요.
        '415':
          description: 지원하지 않는 이미지 형식
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_FILE_TYPE
                message: jpg/png/webp 이미지만 업로드 가능합니다.
        '422':
          description: 이미지에서 성분 텍스트를 인식하지 못함 (폴백 사다리 5단계 도달)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: OCR_UNREADABLE
                message: 성분표를 인식할 수 없습니다. 조명을 밝게 하고 재촬영해 주세요.

  /analysis:
    post:
      tags: [Scan]
      summary: 성분 위험도 판정
      description: |
        바코드 조회 또는 OCR로 얻은 성분 목록을 전달하면
        현재 로그인된 사용자의 알러지·식이 프로필과 대조해 위험도를 판정합니다.
        이 API가 "먹어도 되는지"를 최종 결정합니다.

        verdict 기준:
        - safe    : 모든 성분 이상 없음
        - caution : 주의 성분 포함 (may contain 등, strict 모드에서 활성화)
        - danger  : 알러지 유발 성분 직접 포함

        호출 후 POST /scan-history로 결과를 저장해야 이력이 쌓입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ingredientIds]
              properties:
                productId:
                  type: string
                  description: 바코드 또는 OCR 업서트로 얻은 제품 ID
                  example: prod-001
                ingredientIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  example: [ing-peanut, ing-dairy, ing-sugar]
      responses:
        '200':
          description: 분석 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────
  # 성분 상세
  # ─────────────────────────────────────

  /ingredients/{id}:
    get:
      tags: [Ingredients]
      summary: 성분 상세 조회
      description: |
        분석 결과 화면에서 특정 성분을 탭했을 때 바텀시트로 보여줄
        상세 설명과 근거 자료 링크를 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: ing-peanut
      responses:
        '200':
          description: 성분 상세 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 성분 정보 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INGREDIENT_NOT_FOUND
                message: 해당 성분 정보를 찾을 수 없습니다.

  # ─────────────────────────────────────
  # 스캔 이력
  # ─────────────────────────────────────

  /scan-history:
    post:
      tags: [Scan History]
      summary: 스캔 이력 저장
      description: |
        POST /analysis 호출 후 결과를 이력으로 저장합니다.
        이 데이터가 쌓여야 스캔 이력 화면과 개인 안전 식품 DB가 동작합니다.
        분석 직후 클라이언트에서 자동으로 호출해야 합니다.

        OCR 경로라도 POST /ocr 응답의 `productId`를 반드시 사용합니다
        (product-upsert 파이프라인이 OCR 제품도 `products` 테이블에 insert하므로
         productId 누락 시 플라이휠 데이터 연결이 끊김).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, result]
              properties:
                productId:
                  type: string
                  description: |
                    바코드 스캔 또는 OCR 업서트로 얻은 제품 ID.
                    OCR 경로에서도 반드시 POST /ocr의 productId 사용.
                  example: prod-001
                result:
                  type: string
                  enum: [safe, caution, danger]
                  example: danger
                scanLogId:
                  type: string
                  description: |
                    SSE done 이벤트에서 받은 scanLogId (있으면).
                    플라이휠에서 이 이력과 교정 데이터를 연결하는 데 사용.
                  example: log-001
      responses:
        '201':
          description: 이력 저장 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanHistoryItem'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Scan History]
      summary: 스캔 이력 조회
      description: |
        현재 로그인된 사용자의 스캔 이력을 최신순으로 반환합니다.
        from/to/result 필터와 limit/offset 페이지네이션을 지원합니다.
        스캔 이력 화면(/scan/history)에서 사용합니다.
      parameters:
        - in: query
          name: from
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: 조회 시작일 (YYYY-MM-DD). scanned_at >= from
          example: '2024-01-01'
        - in: query
          name: to
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: 조회 종료일 (YYYY-MM-DD). scanned_at <= toT23:59:59
          example: '2024-12-31'
        - in: query
          name: result
          schema:
            type: string
            enum: [safe, caution, danger]
          description: 판정 결과 필터
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 한 번에 반환할 최대 항목 수
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 건너뛸 항목 수 (페이지네이션)
      responses:
        '200':
          description: 이력 목록 반환
          content:
            application/json:
              schema:
                type: object
                required: [history, hasMore]
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScanHistoryItem'
                  hasMore:
                    type: boolean
                    description: 다음 페이지 존재 여부 (history.length === limit 이면 true)
        '400':
          description: 쿼리 파라미터 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_QUERY
                message: 요청 파라미터가 올바르지 않습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────
  # 즐겨찾기
  # ─────────────────────────────────────

  /favorites:
    post:
      tags: [Favorites]
      summary: 즐겨찾기 추가
      description: |
        스캔 결과 화면의 별표(★) 버튼을 눌렀을 때 호출합니다.
        이미 추가된 제품이면 409를 반환합니다.

        OCR 경로에서도 POST /ocr 응답의 `productId`가 `products` 테이블에 존재하므로
        FK violation은 발생하지 않습니다 (MVP 시절의 로컬 store 회피 패턴 폐기됨).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  example: prod-001
      responses:
        '201':
          description: 즐겨찾기 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 이미 즐겨찾기에 추가된 제품
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: ALREADY_FAVORITED
                message: 이미 즐겨찾기에 추가된 제품입니다.

    get:
      tags: [Favorites]
      summary: 즐겨찾기 목록 조회
      description: |
        현재 로그인된 사용자의 즐겨찾기 목록을 최신순으로 반환합니다.
        즐겨찾기 화면(/list/favorites)에서 사용합니다.
      responses:
        '200':
          description: 즐겨찾기 목록 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  favorites:
                    type: array
                    items:
                      $ref: '#/components/schemas/FavoriteItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /favorites/{id}:
    delete:
      tags: [Favorites]
      summary: 즐겨찾기 삭제
      description: |
        즐겨찾기 목록에서 특정 항목을 삭제합니다.
        id는 GET /favorites 응답의 favorites[].id 값입니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: fav-001
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 즐겨찾기에서 삭제되었습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 즐겨찾기 항목 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FAVORITE_NOT_FOUND
                message: 즐겨찾기 항목을 찾을 수 없습니다.

  # ─────────────────────────────────────
  # 검색
  # ─────────────────────────────────────

  /search/products:
    get:
      tags: [Search]
      summary: 제품 검색 / 전체 목록 조회
      description: |
        검색어(q)를 제공하면 제품명·브랜드 기반 관련성 검색을 수행합니다.
        q를 생략하면 browse 모드로 전체 목록을 반환합니다.

        카테고리 필터: categories[] 파라미터를 중복 전달하면 OR 조건으로 적용됩니다.
        안전 필터: safeOnly=true 설정 시 사용자 알러지 프로필 기준 안전 제품만 반환합니다.

        정렬 방식:
        - relevance : pg_trgm 유사도 기준 (기본)
        - safety    : 안전 제품이 먼저 오도록 (safe → caution → danger)
        - name      : 이름 오름차순

        riskLevel / isSafe는 서버에서 사용자 프로필 기준으로 계산되므로
        클라이언트에서 재계산하지 않습니다.

        Rate limit: 사용자당 분당 60회. 초과 시 429 TOO_MANY_REQUESTS.
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: 검색어 (최소 1자). 생략 시 전체 목록 반환(browse 모드).
          example: peanut
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [relevance, safety, name]
            default: relevance
        - name: safeOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: true면 현재 프로필 기준 안전한 제품만 반환
        - name: categories[]
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [beverages, snacks, bakery, dairy, cereals, cookies, chocolates, spreads, meat, seafood, condiments]
          style: form
          explode: true
          description: 카테고리 필터. 복수 선택 시 OR 조건. BE 내부 OFF 카테고리 식별자와 일치해야 함.
          example: [beverages, snacks]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 300
            default: 0
      responses:
        '200':
          description: 검색 결과 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResultItem'
                  total:
                    type: integer
                    example: 42
                  hasMore:
                    type: boolean
                    example: true
        '400':
          description: q 비어있음 또는 limit/offset 범위 외
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_QUERY
                message: 검색어는 1자 이상이어야 합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /search/suggestions:
    get:
      tags: [Search]
      summary: 검색어 자동완성
      description: |
        검색 탭에서 사용자가 검색어를 입력하는 동안, 제품명/브랜드명에 매칭되는
        자동완성 후보를 실시간으로 반환합니다. 개인화 없이 prefix 매칭만 수행하므로
        응답이 빠릅니다 (캐시 효율 극대화).

        highlight는 자동완성 UI에서 매칭 구간을 강조하기 위한 인덱스 정보입니다
        (field: "name" | "brand", start/end: 문자 인덱스).

        타임아웃 300ms — 서버가 응답하지 못하면 빈 배열을 반환합니다.
        자동완성은 필수 UX가 아니므로 장애 시에도 앱 흐름을 막지 않습니다.

        Rate limit: 사용자당 분당 120회.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: 검색어 (최소 2자)
          example: pea
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: 자동완성 후보 목록 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchSuggestion'
        '400':
          description: q 2자 미만
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_QUERY
                message: 검색어는 2자 이상이어야 합니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  # ─────────────────────────────────────
  # 유저 교정 (데이터 플라이휠)
  # ─────────────────────────────────────

  /corrections:
    post:
      tags: [Corrections]
      summary: 성분 교정 제출
      description: |
        사용자가 스캔 결과의 성분명을 수정한 내용을 제출합니다.
        플라이휠 데이터로 수집되어 주 1회 배치로 골드 세트 후보(`eval/candidates/`)에 추가됩니다.

        **사전 조건**: 사용자가 `consentCorrections=true`로 동의한 상태여야 합니다.
        동의 없이 호출 시 CORRECTION_CONSENT_REQUIRED 반환.

        상세: `docs/ocr-pipeline-rebuild-guide.md §7.4`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scanLogId, corrections]
              properties:
                scanLogId:
                  type: string
                  description: POST /ocr SSE done 이벤트의 scanLogId
                  example: log-001
                corrections:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [originalName, correctedName]
                    properties:
                      ingredientId:
                        type: string
                        description: 원본 성분 ID (있으면)
                        example: ocr-3
                      originalName:
                        type: string
                        example: Sugr
                      correctedName:
                        type: string
                        example: Sugar
      responses:
        '201':
          description: 교정 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: corr-001
                  acceptedCount:
                    type: integer
                    example: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 교정 데이터 수집 미동의
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: CORRECTION_CONSENT_REQUIRED
                message: 교정 데이터 수집 동의가 필요합니다. 프로필 → 개인정보에서 설정해 주세요.

  # ─────────────────────────────────────
  # 관리자 (내부)
  # ─────────────────────────────────────

  /admin/review-queue:
    get:
      tags: [Admin]
      summary: 휴먼 리뷰 대기 큐 조회
      description: |
        폴백 사다리 5단계(추출 실패)에 도달한 스캔을 관리자가 검토하는 대기열입니다.
        관리자 토큰 필요.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 페이지네이션 커서
      responses:
        '200':
          description: 대기열 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReviewQueueItem'
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FORBIDDEN
                message: 관리자 권한이 필요합니다.

# ─────────────────────────────────────
# Phase 2 — 멀티 프로필
# ─────────────────────────────────────

  /profiles/members:
    post:
      tags: [Profiles]
      summary: 멤버 프로필 생성
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberProfileInput'
      responses:
        '201':
          description: 생성된 멤버 프로필
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: DB 사용 불가
    get:
      tags: [Profiles]
      summary: 내 멤버 프로필 목록
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 멤버 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profiles/members/{id}:
    get:
      tags: [Profiles]
      summary: 멤버 프로필 상세
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 멤버 프로필
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 다른 사용자의 프로필
        '404':
          description: 존재하지 않는 프로필
    patch:
      tags: [Profiles]
      summary: 멤버 프로필 수정
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberProfileUpdate'
      responses:
        '200':
          description: 수정된 멤버 프로필
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 다른 사용자의 프로필
        '404':
          description: 존재하지 않는 프로필
    delete:
      tags: [Profiles]
      summary: 멤버 프로필 삭제
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 완료
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 다른 사용자의 프로필
        '404':
          description: 존재하지 않는 프로필

# ─────────────────────────────────────
# Phase 2 — 건강검진
# ─────────────────────────────────────

  /health-reports:
    post:
      tags: [HealthReports]
      summary: 건강검진 파일 업로드
      description: |
        허용 MIME: `application/pdf`, `image/jpeg`, `image/png`. 최대 10MB.
        multipart/form-data 필드: `file`(파일), `title`(필수), `reportDate`(선택, YYYY-MM-DD),
        `notes`(선택), `extractedAllergenIds`(선택, JSON 배열 문자열).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                reportDate:
                  type: string
                  format: date
                notes:
                  type: string
                extractedAllergenIds:
                  type: string
                  description: JSON 배열 문자열 (예 ["ing-milk"])
      responses:
        '201':
          description: 업로드된 건강검진 메타
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReport'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [HealthReports]
      summary: 건강검진 목록
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 건강검진 목록 + 페이지 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthReport'
                  total:
                    type: integer
                  hasMore:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /health-reports/{id}:
    get:
      tags: [HealthReports]
      summary: 건강검진 상세 + signed URL (TTL 5분)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 건강검진 상세 + 다운로드 URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/HealthReport'
                  - type: object
                    properties:
                      downloadUrl:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 존재하지 않거나 소유자 불일치
    patch:
      tags: [HealthReports]
      summary: 건강검진 메타 수정
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                reportDate:
                  type: string
                  format: date
                notes:
                  type: string
                extractedAllergenIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 수정된 건강검진 메타
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 존재하지 않거나 소유자 불일치
    delete:
      tags: [HealthReports]
      summary: 건강검진 삭제 (Storage + row)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 완료
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 존재하지 않거나 소유자 불일치

# ─────────────────────────────────────
# 공통 스키마 및 응답
# ─────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token

  schemas:

    UserProfile:
      type: object
      properties:
        id:
          type: string
          example: uuid-1234
        email:
          type: string
          example: user@example.com
        name:
          type: string
          example: 홍길동
        allergyProfile:
          type: array
          items:
            type: string
          example: [ing-peanut]
        dietaryRestrictions:
          type: array
          items:
            type: string
          example: [vegan]
        sensitivityLevel:
          type: string
          enum: [strict, normal]
          example: normal
        language:
          type: string
          example: ko
        consentFlags:
          type: object
          properties:
            imageRetention:
              type: boolean
              default: false
            corrections:
              type: boolean
              default: false
        hasCompletedSurvey:
          type: boolean
          example: true

    Product:
      type: object
      properties:
        id:
          type: string
          example: prod-001
        barcode:
          type: string
          nullable: true
          example: '0034000020430'
        name:
          type: string
          example: Reese's Peanut Butter Cups
        brand:
          type: string
          example: Hershey's
        image:
          type: string
          format: uri
          example: https://images.openfoodfacts.org/...
        phash:
          type: string
          nullable: true
          description: 64-bit perceptual hash (OCR 업서트 시 설정)
          example: 'c3f1a0b8d4e60927'
        source:
          type: string
          enum: [seed, off, ocr]
          description: 레코드 출처
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientSummary'
        dataCompleteness:
          type: string
          enum: [complete, partial]

    ProductSummary:
      type: object
      description: 목록 표시용 제품 요약 (ingredients 미포함)
      properties:
        id:
          type: string
          example: prod-001
        name:
          type: string
          example: Reese's Peanut Butter Cups
        brand:
          type: string
          example: Hershey's
        image:
          type: string
          format: uri
        isSafe:
          type: boolean
          description: 현재 사용자 프로필 기준 안전 여부
          example: false

    Ingredient:
      type: object
      properties:
        id:
          type: string
          example: ing-peanut
        name:
          type: string
          example: Peanuts
        nameKo:
          type: string
          example: 땅콩
        description:
          type: string
          example: 땅콩은 대표적인 알러지 유발 식품으로 심한 경우 아나필락시스를 일으킬 수 있습니다.
        riskLevel:
          type: string
          enum: [safe, caution, danger]
          example: danger
        sources:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: FDA - Major Food Allergens
              url:
                type: string
                format: uri
                example: https://www.fda.gov/food/food-allergens

    IngredientSummary:
      type: object
      description: |
        목록 표시용 성분 요약 (description, sources 미포함).

        `translations` 는 다국어 성분명 (en/ko/ja/zh/es/fr). 전환기에는 name/nameKo와 공존하며,
        FE는 `translations[userLang] ?? name` 순으로 우선한다
        (docs/ocr-pipeline-rebuild-guide.md §10.2).
      properties:
        id:
          type: string
          example: ing-peanut
        name:
          type: string
          example: Peanuts
        nameKo:
          type: string
          example: 땅콩
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
          description: |
            OCR 인식 신뢰도. 바코드 경로에서는 생략.
            0이면 판독 실패 ([illegible] 표시). 0.85 미만은 클라이언트에서 저신뢰 경고.
        translations:
          type: object
          description: |
            BCP-47 로케일 → 성분명 매핑. OCR 경로에서는 6개 기본 로케일(en/ko/ja/zh/es/fr)이
            항상 채워진다. 바코드/may-* 경로는 생략 가능(optional).
          additionalProperties:
            type: string
          example:
            en: Peanuts
            ko: 땅콩
            ja: ピーナッツ
            zh: 花生
            es: Cacahuetes
            fr: Arachides

    OCRResult:
      type: object
      description: |
        POST /ocr의 JSON 응답 또는 SSE `cached` 이벤트 data.
      properties:
        extractedText:
          type: string
          description: 이미지에서 추출한 원문 텍스트
          example: 'Ingredients: Peanuts, Sugar, Palm Oil, Salt'
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientSummary'
        overallConfidence:
          type: number
          minimum: 0
          maximum: 1
          description: |
            OCR 추출의 전체 신뢰도. 0.85 미만이면 클라이언트에서 경고 배너.
          example: 0.92
        illegibleRegions:
          type: integer
          minimum: 0
          description: 판독 불가 영역 수. > 0이면 일부 성분 누락 가능성.
          example: 0
        detectedLanguages:
          type: array
          items:
            type: string
          description: 감지된 언어 목록 (BCP-47)
          example: [en]
        productId:
          type: string
          description: |
            product-upsert 파이프라인이 반환한 제품 ID.
            즐겨찾기·이력 저장 시 이 ID 사용.
          example: prod-abc
        ladderStage:
          type: integer
          minimum: 1
          maximum: 5
          description: 실제 추출에 도달한 폴백 사다리 단계 (관측성용)
          example: 1
        scanLogId:
          type: string
          description: scan_logs 테이블에 기록된 이 스캔의 로그 ID. 교정 제출 시 사용.
          example: log-001
        cacheHit:
          type: string
          enum: [none, 'phash-local', 'phash-server', barcode]

    OCRDoneMeta:
      type: object
      description: SSE `done` 이벤트의 data. OCRResult에서 ingredients/extractedText를 뺀 메타 정보.
      properties:
        overallConfidence:
          type: number
        illegibleRegions:
          type: integer
        detectedLanguages:
          type: array
          items:
            type: string
        productId:
          type: string
        ladderStage:
          type: integer
        scanLogId:
          type: string

    AnalysisResult:
      type: object
      properties:
        verdict:
          type: string
          enum: [safe, caution, danger]
          description: |
            safe    : 모든 성분 이상 없음
            caution : 주의 성분 포함 (strict 모드에서 may contain 경고)
            danger  : 알러지 유발 성분 직접 포함
          example: danger
        isSafe:
          type: boolean
          example: false
        triggeredBy:
          type: array
          description: 위험 또는 주의 판정을 유발한 성분 목록
          items:
            type: object
            properties:
              id:
                type: string
                example: ing-peanut
              name:
                type: string
                example: Peanuts
              nameKo:
                type: string
                example: 땅콩
              reason:
                type: string
                example: 알러지 프로필에 등록된 성분입니다.
              riskLevel:
                type: string
                enum: [caution, danger]
                example: danger
        safeIngredients:
          type: array
          description: 문제없는 성분 목록
          items:
            $ref: '#/components/schemas/IngredientSummary'
        dataCompleteness:
          type: string
          enum: [complete, partial]
          description: |
            complete : productId가 서버 DB에 존재 (OCR 업서트 후 포함) — 서버사이드 성분 권위
            partial  : 서버 DB 미등록 제품 또는 OFF 폴백 — 결과 신뢰도 낮음

    ScanHistoryItem:
      type: object
      properties:
        id:
          type: string
          example: hist-001
        productId:
          type: string
          example: prod-001
        product:
          $ref: '#/components/schemas/ProductSummary'
        result:
          type: string
          enum: [safe, caution, danger]
          example: danger
        scannedAt:
          type: string
          format: date-time
          example: '2026-04-08T10:30:00Z'
        scanLogId:
          type: string
          nullable: true

    FavoriteItem:
      type: object
      properties:
        id:
          type: string
          example: fav-001
        productId:
          type: string
          example: prod-001
        product:
          $ref: '#/components/schemas/ProductSummary'
        addedAt:
          type: string
          format: date-time
          example: '2026-04-08T10:35:00Z'

    SearchResultItem:
      type: object
      description: |
        GET /search/products items[]. 개인화된 riskLevel · isSafe 포함.
      properties:
        id:
          type: string
          example: prod-001
        name:
          type: string
          example: Reese's Peanut Butter Cups
        brand:
          type: string
          example: Hershey's
        image:
          type: string
          format: uri
          nullable: true
        category:
          type: string
          nullable: true
          description: BE 내부 카테고리 식별자 (beverages / snacks / bakery / dairy / cereals / cookies / chocolates / spreads / meat / seafood / condiments)
          example: snacks
        riskLevel:
          type: string
          enum: [safe, caution, danger]
          description: 현재 사용자 프로필 기준 위험도
          example: danger
        isSafe:
          type: boolean
          description: 현재 사용자 프로필 기준 안전 여부
          example: false

    SearchSuggestion:
      type: object
      description: GET /search/suggestions suggestions[]. 개인화되지 않은 범용 prefix 매칭 결과.
      properties:
        name:
          type: string
          example: Sprite
        highlight:
          type: array
          description: 매칭 구간 인덱스 정보 (자동완성 UI 강조용). [시작, 끝] 쌍의 배열.
          items:
            type: array
            items:
              type: integer
            minItems: 2
            maxItems: 2
          example: [[0, 3]]

    Correction:
      type: object
      properties:
        id:
          type: string
          example: corr-001
        scanLogId:
          type: string
          example: log-001
        corrections:
          type: array
          items:
            type: object
            properties:
              ingredientId:
                type: string
                nullable: true
              originalName:
                type: string
              correctedName:
                type: string
        createdAt:
          type: string
          format: date-time

    ReviewQueueItem:
      type: object
      properties:
        id:
          type: string
          example: rev-001
        phash:
          type: string
          example: 'c3f1a0b8d4e60927'
        imageRef:
          type: string
          nullable: true
          description: 사용자가 동의한 경우에만 존재 (Supabase Storage 경로)
        lastExtraction:
          $ref: '#/components/schemas/OCRResult'
        reason:
          type: string
          enum: [low_confidence, parse_error, timeout, user_reported]
        createdAt:
          type: string
          format: date-time

    MemberProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        name:
          type: string
        profileImage:
          type: string
          nullable: true
        allergyProfile:
          type: array
          items:
            type: string
        dietaryRestrictions:
          type: array
          items:
            type: string
        sensitivityLevel:
          type: string
          enum: [strict, normal]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MemberProfileInput:
      type: object
      required: [name, allergyProfile, dietaryRestrictions, sensitivityLevel]
      properties:
        name:
          type: string
        profileImage:
          type: string
          nullable: true
        allergyProfile:
          type: array
          items:
            type: string
        dietaryRestrictions:
          type: array
          items:
            type: string
        sensitivityLevel:
          type: string
          enum: [strict, normal]

    MemberProfileUpdate:
      type: object
      properties:
        name:
          type: string
        profileImage:
          type: string
          nullable: true
        allergyProfile:
          type: array
          items:
            type: string
        dietaryRestrictions:
          type: array
          items:
            type: string
        sensitivityLevel:
          type: string
          enum: [strict, normal]

    HealthReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        reportDate:
          type: string
          format: date
          nullable: true
        fileMime:
          type: string
          enum: [application/pdf, image/jpeg, image/png]
        fileSizeBytes:
          type: integer
        extractedAllergenIds:
          type: array
          items:
            type: string
        notes:
          type: string
        uploadedAt:
          type: string
          format: date-time

    HealthReportDownload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        downloadUrl:
          type: string
          description: Supabase Storage signed URL (TTL 5분)
        expiresAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: |
            에러 코드 (클라이언트 분기 처리용).
            표준 코드: INVALID_INPUT · INVALID_QUERY · TOO_MANY_REQUESTS ·
                      UNAUTHORIZED · FORBIDDEN · PRODUCT_NOT_FOUND ·
                      OCR_FAILED · OCR_UNREADABLE · IMAGE_TOO_LARGE · INVALID_FILE_TYPE ·
                      INGREDIENT_NOT_FOUND · ALREADY_FAVORITED · FAVORITE_NOT_FOUND ·
                      CORRECTION_CONSENT_REQUIRED · PROFILE_NOT_FOUND · FORBIDDEN_PROFILE ·
                      NOT_FOUND · STORAGE_UNAVAILABLE
          example: INVALID_INPUT
        message:
          type: string
          description: 사람이 읽을 수 있는 에러 메시지
          example: 요청 데이터가 올바르지 않습니다.

    ErrorEvent:
      type: object
      description: SSE `error` 이벤트의 data.
      properties:
        error:
          type: string
          example: OCR_UNREADABLE
        message:
          type: string
        retryable:
          type: boolean
          description: true면 같은 이미지로 재시도 가능, false면 재촬영 필요
          example: false
        ladderStage:
          type: integer

  responses:

    Unauthorized:
      description: 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            message: 인증이 필요합니다. 다시 로그인해 주세요.

    InvalidInput:
      description: 요청 데이터 유효성 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: INVALID_INPUT
            message: 요청 데이터가 올바르지 않습니다.

    TooManyRequests:
      description: Rate limit 초과 (Retry-After 헤더 포함)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: TOO_MANY_REQUESTS
            message: 요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.
