openapi: 3.0.3
info:
  title: CLIR API
  description: |
    식품 바코드/OCR 스캔 → 성분 분석 → 알러지·식이 프로필 대조 → 개인화 위협 판정

    ## 인증
    로그인 후 발급받은 JWT 토큰을 모든 보호된 엔드포인트의
    Authorization 헤더에 포함해야 합니다.
    Authorization: Bearer {token}

    ## OCR
    이미지 분석은 OpenAI Vision API (gpt-4o)를 사용합니다.
    이미지 파일을 multipart/form-data로 전송하면
    서버가 OpenAI API를 호출해 성분 텍스트를 추출·파싱합니다.

    ## MVP 범위
    - 회원가입 / 설문조사 / 로그인
    - 바코드 또는 OCR 스캔 후 성분 분석
    - 알러지·식이 위험도 판정 (safe / caution / danger)
    - 즐겨찾기 등록·조회·삭제
    - 스캔 이력 저장·조회
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: 로컬 개발 서버
  - url: https://api.clir.app
    description: 프로덕션 서버

security:
  - BearerAuth: []

paths:

  # ─────────────────────────────────────
  # 인증 (Auth)
  # ─────────────────────────────────────

  /auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      description: |
        새 계정을 생성합니다.
        성공 시 userId를 반환하며, 이후 /auth/survey에서 알러지 프로필을 등록합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: mypassword123
                name:
                  type: string
                  example: 홍길동
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                    example: uuid-1234
                  email:
                    type: string
                    example: user@example.com
                  name:
                    type: string
                    example: 홍길동
        '400':
          $ref: '#/components/responses/InvalidInput'
        '409':
          description: 이미 사용 중인 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: EMAIL_ALREADY_EXISTS
                message: 이미 사용 중인 이메일입니다.

  /auth/survey:
    post:
      tags: [Auth]
      summary: 설문조사 제출
      description: |
        회원가입 직후 알러지 프로필, 식이 제한, 민감도를 저장합니다.
        이 데이터를 기반으로 이후 성분 분석 시 개인화된 위험도를 판정합니다.
        로그인 후 프로필 수정 시에도 재사용할 수 있습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [allergyProfile, dietaryRestrictions, sensitivityLevel]
              properties:
                allergyProfile:
                  type: array
                  items:
                    type: string
                  example: [ing-peanut, ing-gluten]
                  description: |
                    알러지 성분 ID 목록.
                    가능한 값: ing-peanut, ing-gluten, ing-dairy,
                               ing-egg, ing-shellfish, ing-treenut
                dietaryRestrictions:
                  type: array
                  items:
                    type: string
                  example: [vegan]
                  description: |
                    식이 제한 목록.
                    가능한 값: vegan, vegetarian, halal, kosher
                sensitivityLevel:
                  type: string
                  enum: [strict, normal]
                  example: strict
                  description: |
                    strict: 엄격 모드 — may contain 포함 경고
                    normal: 일반 모드 — 직접 함유만 경고
      responses:
        '200':
          description: 설문 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 설문이 저장되었습니다.
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      description: |
        이메일과 비밀번호로 로그인합니다.
        성공 시 JWT 토큰과 사용자 프로필을 함께 반환합니다.
        로그인 응답에 user 객체를 포함하는 이유:
        앱 실행 직후 알러지 프로필을 바로 로드해야 하므로
        별도 API 호출 없이 한 번에 처리하기 위함입니다.

        POST를 사용하는 이유:
        비밀번호를 URL에 노출하지 않기 위해 body에 담아 전송합니다.
        GET 사용 시 비밀번호가 서버 로그와 브라우저 히스토리에 평문으로 남습니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: mypassword123
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: 이후 요청에 사용할 JWT 토큰
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 이메일 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_CREDENTIALS
                message: 이메일 또는 비밀번호가 올바르지 않습니다.

  # ─────────────────────────────────────
  # 제품 / 스캔
  # ─────────────────────────────────────

  /products/{barcode}:
    get:
      tags: [Products]
      summary: 바코드로 제품 조회
      description: |
        바코드 번호로 제품 정보를 조회합니다.
        자체 DB를 먼저 조회하고, 없으면 Open Food Facts API에서 가져옵니다.
        반환된 ingredients 목록을 POST /analysis에 전달해 위험도를 판정합니다.
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
          example: '0034000020430'
      responses:
        '200':
          description: 제품 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 등록되지 않은 바코드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PRODUCT_NOT_FOUND
                message: 등록되지 않은 제품입니다.

  /products/{id}/alternatives:
    get:
      tags: [Products]
      summary: 대체 제품 추천
      description: |
        분석 결과 danger 또는 caution 판정이 났을 때 호출합니다.
        같은 카테고리 내에서 현재 사용자 프로필 기준으로 안전한 제품 목록을 반환합니다.
        대체 제품이 없을 경우 빈 배열을 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: prod-001
      responses:
        '200':
          description: 대체 제품 목록 반환 (없으면 빈 배열)
          content:
            application/json:
              schema:
                type: object
                properties:
                  alternatives:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 제품을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: PRODUCT_NOT_FOUND
                message: 해당 제품을 찾을 수 없습니다.

  /ocr:
    post:
      tags: [Scan]
      summary: OCR 성분 추출
      description: |
        식품 성분표 이미지를 업로드하면 OpenAI Vision API (gpt-4o)를 통해
        성분 텍스트를 추출하고 성분 ID 목록으로 파싱해 반환합니다.
        바코드가 없거나 인식이 안 될 때 사용합니다.

        반환된 ingredients를 POST /analysis에 전달해 위험도를 판정합니다.

        POST를 사용하는 이유:
        이미지 파일을 서버로 전송해야 하므로 body가 필요합니다.
        GET으로는 파일을 전송할 수 없습니다.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: 성분표가 포함된 식품 이미지 파일 (jpg, png)
      responses:
        '200':
          description: OCR 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  extractedText:
                    type: string
                    description: OpenAI가 이미지에서 추출한 원문 텍스트
                    example: Ingredients: Peanuts, Sugar, Palm Oil, Salt
                  ingredients:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngredientSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 이미지에서 성분 텍스트를 인식하지 못함
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: OCR_FAILED
                message: 성분표를 인식할 수 없습니다. 다시 촬영해 주세요.

  /analysis:
    post:
      tags: [Scan]
      summary: 성분 위험도 판정
      description: |
        바코드 조회 또는 OCR로 얻은 성분 목록을 전달하면
        현재 로그인된 사용자의 알러지·식이 프로필과 대조해 위험도를 판정합니다.
        이 API가 "먹어도 되는지"를 최종 결정합니다.

        verdict 기준:
        - safe    : 모든 성분 이상 없음
        - caution : 주의 성분 포함 (may contain 등, strict 모드에서 활성화)
        - danger  : 알러지 유발 성분 직접 포함

        호출 후 POST /scan-history로 결과를 저장해야 이력이 쌓입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ingredientIds]
              properties:
                productId:
                  type: string
                  description: 바코드 스캔 시 함께 전달 (OCR 시 생략 가능)
                  example: prod-001
                ingredientIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  example: [ing-peanut, ing-dairy, ing-sugar]
      responses:
        '200':
          description: 분석 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────
  # 성분 상세
  # ─────────────────────────────────────

  /ingredients/{id}:
    get:
      tags: [Ingredients]
      summary: 성분 상세 조회
      description: |
        분석 결과 화면에서 특정 성분을 탭했을 때 바텀시트로 보여줄
        상세 설명과 근거 자료 링크를 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: ing-peanut
      responses:
        '200':
          description: 성분 상세 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 성분 정보 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INGREDIENT_NOT_FOUND
                message: 해당 성분 정보를 찾을 수 없습니다.

  # ─────────────────────────────────────
  # 스캔 이력
  # ─────────────────────────────────────

  /scan-history:
    post:
      tags: [Scan History]
      summary: 스캔 이력 저장
      description: |
        POST /analysis 호출 후 결과를 이력으로 저장합니다.
        이 데이터가 쌓여야 스캔 이력 화면과 개인 안전 식품 DB가 동작합니다.
        분석 직후 클라이언트에서 자동으로 호출해야 합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result]
              properties:
                productId:
                  type: string
                  description: 바코드 스캔 시 포함 (OCR 시 생략 가능)
                  example: prod-001
                result:
                  type: string
                  enum: [safe, caution, danger]
                  example: danger
      responses:
        '201':
          description: 이력 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: hist-001
                  productId:
                    type: string
                    example: prod-001
                  result:
                    type: string
                    enum: [safe, caution, danger]
                    example: danger
                  scannedAt:
                    type: string
                    format: date-time
                    example: '2026-04-08T10:30:00Z'
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Scan History]
      summary: 스캔 이력 조회
      description: |
        현재 로그인된 사용자의 스캔 이력 전체를 최신순으로 반환합니다.
        스캔 이력 화면(/scan/history)에서 사용합니다.
      responses:
        '200':
          description: 이력 목록 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: hist-001
                        product:
                          $ref: '#/components/schemas/ProductSummary'
                        result:
                          type: string
                          enum: [safe, caution, danger]
                          example: danger
                        scannedAt:
                          type: string
                          format: date-time
                          example: '2026-04-08T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─────────────────────────────────────
  # 즐겨찾기
  # ─────────────────────────────────────

  /favorites:
    post:
      tags: [Favorites]
      summary: 즐겨찾기 추가
      description: |
        스캔 결과 화면의 별표(★) 버튼을 눌렀을 때 호출합니다.
        이미 추가된 제품이면 409를 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  example: prod-001
      responses:
        '201':
          description: 즐겨찾기 추가 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: fav-001
                  productId:
                    type: string
                    example: prod-001
                  addedAt:
                    type: string
                    format: date-time
                    example: '2026-04-08T10:35:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 이미 즐겨찾기에 추가된 제품
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: ALREADY_FAVORITED
                message: 이미 즐겨찾기에 추가된 제품입니다.

    get:
      tags: [Favorites]
      summary: 즐겨찾기 목록 조회
      description: |
        현재 로그인된 사용자의 즐겨찾기 목록을 최신순으로 반환합니다.
        즐겨찾기 화면(/list/favorites)에서 사용합니다.
      responses:
        '200':
          description: 즐겨찾기 목록 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  favorites:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: fav-001
                        product:
                          $ref: '#/components/schemas/ProductSummary'
                        addedAt:
                          type: string
                          format: date-time
                          example: '2026-04-08T10:35:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /favorites/{id}:
    delete:
      tags: [Favorites]
      summary: 즐겨찾기 삭제
      description: |
        즐겨찾기 목록에서 특정 항목을 삭제합니다.
        id는 GET /favorites 응답의 favorites[].id 값입니다.

        DELETE를 사용하는 이유:
        리소스 삭제 의미를 명확히 표현하기 위함입니다.
        POST나 GET으로 삭제를 구현하는 것은 HTTP 메서드 의미에 맞지 않습니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: fav-001
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 즐겨찾기에서 삭제되었습니다.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 즐겨찾기 항목 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: FAVORITE_NOT_FOUND
                message: 즐겨찾기 항목을 찾을 수 없습니다.

# ─────────────────────────────────────
# 공통 스키마 및 응답
# ─────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: POST /auth/login 응답의 token 값

  schemas:

    User:
      type: object
      properties:
        id:
          type: string
          example: uuid-1234
        name:
          type: string
          example: 홍길동
        email:
          type: string
          example: user@example.com
        allergyProfile:
          type: array
          items:
            type: string
          example: [ing-peanut, ing-gluten]
        dietaryRestrictions:
          type: array
          items:
            type: string
          example: [vegan]
        sensitivityLevel:
          type: string
          enum: [strict, normal]
          example: strict

    Product:
      type: object
      properties:
        id:
          type: string
          example: prod-001
        barcode:
          type: string
          example: '0034000020430'
        name:
          type: string
          example: Reese's Peanut Butter Cups
        brand:
          type: string
          example: Hershey's
        image:
          type: string
          format: uri
          example: https://images.openfoodfacts.org/...
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientSummary'

    ProductSummary:
      type: object
      description: 목록 표시용 제품 요약 (ingredients 미포함)
      properties:
        id:
          type: string
          example: prod-001
        name:
          type: string
          example: Reese's Peanut Butter Cups
        brand:
          type: string
          example: Hershey's
        image:
          type: string
          format: uri
          example: https://images.openfoodfacts.org/...
        isSafe:
          type: boolean
          description: 현재 사용자 프로필 기준 안전 여부
          example: false

    Ingredient:
      type: object
      properties:
        id:
          type: string
          example: ing-peanut
        name:
          type: string
          example: Peanuts
        nameKo:
          type: string
          example: 땅콩
        description:
          type: string
          example: 땅콩은 대표적인 알러지 유발 식품으로 심한 경우 아나필락시스를 일으킬 수 있습니다.
        riskLevel:
          type: string
          enum: [safe, caution, danger]
          example: danger
        sources:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: FDA - Major Food Allergens
              url:
                type: string
                format: uri
                example: https://www.fda.gov/food/food-allergens

    IngredientSummary:
      type: object
      description: 목록 표시용 성분 요약 (description, sources 미포함)
      properties:
        id:
          type: string
          example: ing-peanut
        name:
          type: string
          example: Peanuts
        nameKo:
          type: string
          example: 땅콩

    AnalysisResult:
      type: object
      properties:
        verdict:
          type: string
          enum: [safe, caution, danger]
          description: |
            safe    : 모든 성분 이상 없음
            caution : 주의 성분 포함 (strict 모드에서 may contain 경고)
            danger  : 알러지 유발 성분 직접 포함
          example: danger
        isSafe:
          type: boolean
          example: false
        triggeredBy:
          type: array
          description: 위험 또는 주의 판정을 유발한 성분 목록
          items:
            type: object
            properties:
              id:
                type: string
                example: ing-peanut
              name:
                type: string
                example: Peanuts
              nameKo:
                type: string
                example: 땅콩
              reason:
                type: string
                example: 알러지 프로필에 등록된 성분입니다.
              riskLevel:
                type: string
                enum: [caution, danger]
                example: danger
        safeIngredients:
          type: array
          description: 문제없는 성분 목록
          items:
            $ref: '#/components/schemas/IngredientSummary'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 에러 코드 (클라이언트 분기 처리용)
          example: INVALID_INPUT
        message:
          type: string
          description: 사람이 읽을 수 있는 에러 메시지
          example: 요청 데이터가 올바르지 않습니다.

  responses:

    Unauthorized:
      description: 토큰 없음 또는 만료
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            message: 인증이 필요합니다. 다시 로그인해 주세요.

    InvalidInput:
      description: 요청 데이터 유효성 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: INVALID_INPUT
            message: 요청 데이터가 올바르지 않습니다.
